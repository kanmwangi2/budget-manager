services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: sqlite:////app/data/budget_manager.db
    volumes:
      - sqlite_data:/app/data
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000/api
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  sqlite_data:
